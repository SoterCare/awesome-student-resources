name: ⭐ Suggest a Resource
description: Suggest a resource to add to the list
title: "[Resource]: "
labels: ["resource-suggestion"]
body:
  - type: input
    attributes:
      label: Resource name
    validations:
      required: true
  - type: input
    attributes:
      label: Link
      placeholder: https://
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Which category?
      options:
        - Programming (Python / JavaScript / Rust / Java)
        - Web Development
        - Artificial Intelligence
        - Machine Learning
        - Cloud Computing (AWS / Azure / GCP)
        - Blockchain (Ethereum / Solana / Algorand)
        - Open Source (Git / GitHub / First Contribution)
        - Career (Resume / Interview / Internships)
        - Hackathons
        - New category (explain below)
    validations:
      required: true
  - type: textarea
    attributes:
      label: Why is it worth someone's time?
      description: One or two sentences on what makes this genuinely useful for students.
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: It's free or has a genuinely useful free tier
        - label: It's currently maintained (no dead link)
        - label: It's not already in the list
        - label: I'd like to add it myself via a PR
